    <rect x="376" width="124" height="32" rx="8" fill="#0B0D12"/>
    <text x="438" y="20" text-anchor="middle" font-size="12" fill="#C7F470" font-family="JetBrains Mono, monospace">+ 新增條目</text>
  </g>

  <!-- Table header -->
  <g transform="translate(30,116)" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#FF5A1F">
    <text x="0" y="0">SPOKEN</text>
    <text x="170" y="0">CANONICAL</text>
    <text x="340" y="0">CONTEXT</text>
  </g>

  <!-- Rows -->
  <g transform="translate(30,134)" font-size="12">
    <g>
      <rect width="500" height="38" rx="8" fill="#EFEBE0"/>
      <text x="14" y="24" fill="#0B0D12">focus</text>
      <text x="184" y="24" fill="#FF5A1F" font-weight="600">vocus</text>
      <text x="354" y="24" fill="#605C55">company name (audio)</text>
    </g>
    <g transform="translate(0,46)">
      <rect width="500" height="38" rx="8" fill="#FAF7EE" stroke="#D8D2C3"/>
      <text x="14" y="24" fill="#0B0D12">carpenter</text>
      <text x="184" y="24" fill="#FF5A1F" font-weight="600">Karpenter</text>
      <text x="354" y="24" fill="#605C55">k8s autoscaler</text>
    </g>
    <g transform="translate(0,92)">
      <rect width="500" height="38" rx="8" fill="#EFEBE0"/>
      <text x="14" y="24" fill="#0B0D12">cloud flare</text>
      <text x="184" y="24" fill="#FF5A1F" font-weight="600">Cloudflare</text>
      <text x="354" y="24" fill="#605C55">CDN brand (one word)</text>
    </g>
    <g transform="translate(0,138)">
      <rect width="500" height="38" rx="8" fill="#FAF7EE" stroke="#D8D2C3"/>
      <text x="14" y="24" fill="#0B0D12">奶特 J 嗯思</text>
      <text x="184" y="24" fill="#FF5A1F" font-weight="600">Next.js</text>
      <text x="354" y="24" fill="#605C55">framework name</text>
    </g>
    <g transform="translate(0,184)">
      <rect width="500" height="38" rx="8" fill="#EFEBE0"/>
      <text x="14" y="24" fill="#0B0D12">蘇坡貝斯</text>
      <text x="184" y="24" fill="#FF5A1F" font-weight="600">Supabase</text>
      <text x="354" y="24" fill="#605C55">DB / auth platform</text>
    </g>
  </g>

  <!-- Bottom badges -->
  <g transform="translate(30,360)" font-family="JetBrains Mono, monospace" font-size="11">
    <rect width="120" height="28" rx="6" fill="#0B0D12"/>
