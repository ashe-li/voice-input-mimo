  <!-- Detail: skills composer -->
  <g transform="translate(372,68)">
    <text x="0" y="14" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#FF5A1F">SKILLS · COMPOSED</text>
    <g transform="translate(0,28)">
