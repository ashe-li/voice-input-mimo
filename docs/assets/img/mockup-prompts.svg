<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" fill="none" font-family="Inter, 'Noto Sans TC', sans-serif">
  <!-- Window -->
  <rect x="10" y="10" width="540" height="400" rx="18" fill="#FAF7EE" stroke="#D8D2C3"/>
  <circle cx="36" cy="34" r="5" fill="#E5614A"/>
  <circle cx="54" cy="34" r="5" fill="#F4B548"/>
  <circle cx="72" cy="34" r="5" fill="#7CC57F"/>
  <text x="280" y="38" text-anchor="middle" font-size="12" fill="#605C55">Settings · Prompts</text>

  <!-- Sidebar -->
  <rect x="20" y="60" width="150" height="340" rx="10" fill="#EFEBE0"/>
