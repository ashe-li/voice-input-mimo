<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" fill="none" font-family="Inter, 'Noto Sans TC', sans-serif">
  <!-- Input column -->
  <g transform="translate(20,40)">
    <rect width="190" height="240" rx="14" fill="#FAF7EE" stroke="#D8D2C3"/>
    <text x="14" y="26" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#605C55">INPUT</text>
    <text x="14" y="58" font-size="13" fill="#0B0D12">嗯就是…那個</text>
    <text x="14" y="80" font-size="13" fill="#0B0D12">把這個 component</text>
    <text x="14" y="102" font-size="13" fill="#0B0D12">重構成 hook</text>
    <text x="14" y="124" font-size="13" fill="#0B0D12">大概 30 分鐘</text>
    <text x="14" y="146" font-size="13" fill="#0B0D12">應該就可以</text>
    <text x="14" y="172" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF5A1F">→ 路徑分流</text>
  </g>

  <!-- 4 output columns -->
  <g transform="translate(240,20)">
    <!-- Card 1 raw -->
    <g transform="translate(0,0)">
      <rect width="220" height="60" rx="12" fill="#0B0D12"/>
      <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#C7F470">RAW · ASR</text>
      <text x="14" y="44" font-size="12" fill="#FAF7EE">嗯就是把這個 component 重構成 hook…</text>
    </g>
    <!-- Card 2 refine -->
    <g transform="translate(0,70)">
      <rect width="220" height="60" rx="12" fill="#0B0D12"/>
      <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#F4B548">REFINE</text>
      <text x="14" y="44" font-size="12" fill="#FAF7EE">把這個 component 重構成 hook。</text>
    </g>
    <!-- Card 3 EN -->
    <g transform="translate(0,140)">
      <rect width="220" height="60" rx="12" fill="#0B0D12"/>
      <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#4DA8FF">EN · CLAUDE</text>
      <text x="14" y="44" font-size="12" fill="#FAF7EE">Refactor this component into a hook.</text>
    </g>
    <!-- Card 4 structure -->
    <g transform="translate(0,210)">
      <rect width="220" height="60" rx="12" fill="#0B0D12"/>
      <text x="14" y="22" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#FF5A1F">STRUCTURE → TASK</text>
      <text x="14" y="44" font-size="12" fill="#FAF7EE">[ ] 重構 component → hook（30m）</text>
    </g>
  </g>

  <!-- Connectors -->
  <g stroke="#D8D2C3" stroke-width="1.6" fill="none">
    <path d="M210 90 Q230 90 240 30"/>
    <path d="M210 130 Q230 130 240 100"/>
    <path d="M210 170 Q230 170 240 170"/>
    <path d="M210 210 Q230 210 240 240"/>
  </g>

  <!-- Switch hint -->
  <g transform="translate(480,40)">
    <rect width="220" height="240" rx="14" fill="#0B0D12"/>
    <text x="14" y="28" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#C7F470">SWITCH MODE</text>
    <g transform="translate(14,52)">
      <rect width="42" height="22" rx="6" fill="#FAF7EE"/>
      <text x="21" y="16" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" fill="#0B0D12">Ctrl</text>
      <text x="50" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#FAF7EE">+</text>
      <rect x="60" width="32" height="22" rx="6" fill="#FAF7EE"/>
      <text x="76" y="16" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="600" font-size="10" fill="#0B0D12">⌥</text>
      <text x="98" y="16" font-family="JetBrains Mono, monospace" font-size="11" fill="#FAF7EE">+</text>
      <rect x="108" width="30" height="22" rx="6" fill="#FAF7EE"/>
      <text x="123" y="16" text-anchor="middle" font-family="JetBrains Mono, monospace" font-weight="600" font-size="12" fill="#0B0D12">→</text>
    </g>
    <text x="14" y="106" font-size="12" fill="#FAF7EE" opacity="0.7">輪轉至下一個輸出模式</text>

    <text x="14" y="148" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" fill="#C7F470">OR</text>
    <text x="14" y="178" font-size="12" fill="#FAF7EE" opacity="0.7">從 menu bar 選</text>
    <text x="14" y="200" font-size="13" fill="#FAF7EE">輸出模式 ▸ 英文翻譯</text>
    <circle cx="14" cy="225" r="3" fill="#FF5A1F"/>
    <text x="24" y="229" font-size="11" fill="#C7F470">當前模式顯示在標題列</text>
  </g>
</svg>
