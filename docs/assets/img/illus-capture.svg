<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" fill="none" font-family="Inter, 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="cap-wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF5A1F"/>
      <stop offset="1" stop-color="#4DA8FF"/>
    </linearGradient>
  </defs>

  <!-- Keyboard row -->
  <g transform="translate(36,150)">
    <rect x="0"   y="0" width="60" height="60" rx="10" fill="#FAF7EE" stroke="#D8D2C3"/>
    <rect x="68"  y="0" width="60" height="60" rx="10" fill="#FAF7EE" stroke="#D8D2C3"/>
    <rect x="136" y="0" width="60" height="60" rx="10" fill="#FAF7EE" stroke="#D8D2C3"/>
    <!-- Fn key highlighted -->
    <rect x="204" y="0" width="60" height="60" rx="10" fill="#0B0D12"/>
    <text x="234" y="38" text-anchor="middle" font-weight="700" font-size="18" fill="#FAF7EE">Fn</text>
    <rect x="272" y="0" width="60" height="60" rx="10" fill="#FAF7EE" stroke="#D8D2C3"/>
    <rect x="340" y="0" width="60" height="60" rx="10" fill="#FAF7EE" stroke="#D8D2C3"/>
    <rect x="408" y="0" width="60" height="60" rx="10" fill="#FAF7EE" stroke="#D8D2C3"/>
    <!-- Press indicator -->
    <path d="M234 -10 L234 -28 M228 -22 L234 -28 L240 -22" stroke="#FF5A1F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="234" y="-40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#FF5A1F" letter-spacing="2">PRESS &amp; HOLD</text>
  </g>

  <!-- Speech bubble + waveform -->
  <g transform="translate(440,40)">
    <path d="M0 30 a16 16 0 0 1 16 -16 H224 a16 16 0 0 1 16 16 V102 a16 16 0 0 1 -16 16 H50 L20 138 L30 118 H16 a16 16 0 0 1 -16 -16 Z"
          fill="#0B0D12"/>
    <!-- Waveform -->
    <g transform="translate(22,46)">
      <rect x="0"   y="14" width="3" height="22" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="9"   y="6"  width="3" height="38" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="18"  y="10" width="3" height="30" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="27"  y="2"  width="3" height="46" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="36"  y="14" width="3" height="22" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="45"  y="8"  width="3" height="34" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="54"  y="0"  width="3" height="50" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="63"  y="12" width="3" height="26" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="72"  y="6"  width="3" height="38" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="81"  y="14" width="3" height="22" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="90"  y="10" width="3" height="30" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="99"  y="4"  width="3" height="42" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="108" y="12" width="3" height="26" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="117" y="16" width="3" height="18" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="126" y="8"  width="3" height="34" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="135" y="14" width="3" height="22" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="144" y="6"  width="3" height="38" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="153" y="10" width="3" height="30" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="162" y="2"  width="3" height="46" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="171" y="14" width="3" height="22" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="180" y="8"  width="3" height="34" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="189" y="0"  width="3" height="50" rx="1.5" fill="url(#cap-wave)"/>
      <rect x="198" y="14" width="3" height="22" rx="1.5" fill="url(#cap-wave)"/>
    </g>
  </g>
</svg>
